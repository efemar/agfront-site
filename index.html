<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgFRONT | Think Global</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff; /* White background */
            color: #333333; /* Dark text for readability */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 700px;
            padding: 20px;
        }
        .logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 30px;
        }
        h1 {
            font-weight: 600;
            letter-spacing: 1px;
            color: #1a3a5a; /* A professional deep blue */
        }
        p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #555555;
            margin-bottom: 30px;
        }
        .cta-button {
            display: inline-block;
            padding: 15px 35px;
            background-color: #4CAF50; /* AgFRONT Green */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        .cta-button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #999;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="AgFRONT Logo" class="logo">
        
        <h1>Global Vision. New Experience.</h1>
        
        <p>
            We are currently cultivating a brand new digital presence to better serve 
            the global agricultural community. AgFRONT is still active and 
            operating—we're just cleaning up the shop.
        </p>
        
        <a href="mailto:emarques@agfront.com" class="cta-button">Get In Touch</a>

        <div class="footer">
            &copy; 2026 AgFRONT. THINK GLOBAL.
        </div>
    </div>

</body>
</html>
